<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>绘本阅读报告</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app"></div>

    <script src="js/mockData.js?v=3"></script>
    <script src="js/services.js?v=3"></script>
    <script src="js/app.js?v=3"></script>
    <script>
        // 初始化移动端应用
        document.addEventListener('DOMContentLoaded', function() {
            // 加载已生成的 AI 报告（班级 / 幼儿）以便手机端展示
            try {
                App.loadAiClassReports?.();
                App.loadAiStudentReports?.();
            } catch (e) {}
            // 默认显示第一个班级的报告
            const firstClass = MockData.classes[0];
            if (firstClass) {
                App.renderMobileClassReport(firstClass.id);
            }
        });
    </script>
</body>
</html>
