<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>绘本阅读报告</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* 手机端 AI 报告 markdown 容器 —— 确保灰字不浮在白底上 */
        .mobile-ai-md, .mobile-ai-md * { color: #1A1B25 !important; }
        .mobile-ai-md .text-slate-200,
        .mobile-ai-md .text-slate-300,
        .mobile-ai-md .text-slate-400,
        .mobile-ai-md .text-slate-500 { color: #1A1B25 !important; -webkit-text-fill-color: #1A1B25 !important; }
        .mobile-ai-md h1,
        .mobile-ai-md h2,
        .mobile-ai-md .text-amber-300 { color: #4338CA !important; -webkit-text-fill-color: #4338CA !important; font-weight: 700 !important; font-size: 1.05rem; margin: 14px 0 8px; }
        .mobile-ai-md h3,
        .mobile-ai-md h4,
        .mobile-ai-md .text-cyan-300 { color: #1E3A8A !important; -webkit-text-fill-color: #1E3A8A !important; font-weight: 600 !important; font-size: 0.95rem; margin: 12px 0 6px; }
        .mobile-ai-md strong,
        .mobile-ai-md strong.text-amber-200 { color: #6D28D9 !important; -webkit-text-fill-color: #6D28D9 !important; font-weight: 700 !important; }
        .mobile-ai-md ul.list-disc { padding-left: 22px; margin: 8px 0; }
        .mobile-ai-md ul.list-disc li { margin: 4px 0; }
        .mobile-ai-md ul.list-disc li::marker { color: #6D28D9 !important; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app"></div>

    <script src="js/mockData.js?v=3"></script>
    <script src="js/services.js?v=3"></script>
    <script src="js/app.js?v=3"></script>
    <script>
        // 初始化移动端应用
        document.addEventListener('DOMContentLoaded', function() {
            // 加载已生成的 AI 报告（班级 / 幼儿）以便手机端展示
            try {
                App.loadAiClassReports?.();
                App.loadAiStudentReports?.();
            } catch (e) {}
            // 默认显示第一个班级的报告
            const firstClass = MockData.classes[0];
            if (firstClass) {
                App.renderMobileClassReport(firstClass.id);
            }
        });
    </script>
</body>
</html>
