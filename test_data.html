<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据测试页面</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="js/mockData.js"></script>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            background: #1e293b;
            border-radius: 8px;
        }
        .chart-container {
            width: 100%;
            height: 300px;
            background: #334155;
            margin: 10px 0;
            border-radius: 8px;
        }
        .ranking-item {
            padding: 10px;
            margin: 5px 0;
            background: #334155;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>数据展示测试</h1>
    
    <div class="test-section">
        <h2>调试信息:</h2>
        <div id="debug-info"></div>
    </div>
    
    <div class="test-section">
        <h2>班级排行榜测试:</h2>
        <div id="class-ranking-test"></div>
    </div>
    
    <div class="test-section">
        <h2>图表测试:</h2>
        <div class="chart-container" id="chart-test"></div>
    </div>

    <script>
        function log(message) {
            const debugInfo = document.getElementById('debug-info');
            debugInfo.innerHTML += `<div>${message}</div>`;
            console.log(message);
        }
        
        // 测试数据可用性
        document.addEventListener('DOMContentLoaded', function() {
            log('页面加载完成');
            log('MockData可用性: ' + (typeof MockData !== 'undefined'));
            log('ECharts可用性: ' + (typeof echarts !== 'undefined'));
            
            if (typeof MockData !== 'undefined') {
                log('MockData.classRanking: ' + (MockData.classRanking ? MockData.classRanking.length : 'undefined'));
                log('MockData.bookTypes: ' + (MockData.bookTypes ? MockData.bookTypes.length : 'undefined'));
            }
            
            // 测试排行榜渲染
            testRanking();
            
            // 测试图表渲染
            testChart();
        });
        
        function testRanking() {
            const container = document.getElementById('class-ranking-test');
            if (!container) {
                log('❌ 排行榜测试容器未找到');
                return;
            }
            
            if (!MockData || !MockData.classRanking) {
                log('❌ MockData或classRanking数据不存在');
                return;
            }
            
            log('✅ 开始渲染排行榜测试');
            container.innerHTML = MockData.classRanking.map((cls, index) => `
                <div class="ranking-item">
                    <strong>${index + 1}. ${cls.name}</strong> - ${cls.activities}次活动
                </div>
            `).join('');
            log('✅ 排行榜测试渲染完成');
        }
        
        function testChart() {
            const chartDom = document.getElementById('chart-test');
            if (!chartDom) {
                log('❌ 图表测试容器未找到');
                return;
            }
            
            if (typeof echarts === 'undefined') {
                log('❌ ECharts未加载');
                return;
            }
            
            if (!MockData || !MockData.bookTypes) {
                log('❌ 缺少图表数据');
                return;
            }
            
            log('✅ 开始初始化图表测试');
            try {
                const chart = echarts.init(chartDom);
                const option = {
                    title: {
                        text: '绘本类型分布测试',
                        textStyle: { color: '#ffffff' }
                    },
                    backgroundColor: 'transparent',
                    tooltip: {
                        trigger: 'item',
                        backgroundColor: 'rgba(15, 23, 42, 0.95)',
                        textStyle: { color: '#fff' }
                    },
                    series: [{
                        name: '绘本类型',
                        type: 'pie',
                        radius: '50%',
                        data: MockData.bookTypes.map(item => ({
                            value: item.value,
                            name: item.name
                        })),
                        itemStyle: {
                            borderRadius: 8,
                            borderColor: '#1e293b',
                            borderWidth: 2
                        }
                    }]
                };
                
                chart.setOption(option);
                log('✅ 图表测试渲染成功');
            } catch (error) {
                log('❌ 图表测试失败: ' + error.message);
                console.error(error);
            }
        }
    </script>
</body>
</html>
